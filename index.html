<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea House</title>

    <!-- Fav Icon -->
    <link rel="shortcut icon" href="./images/cup.png" type="image/x-icon">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">

    <!-- Tailwind Css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Custom CSS -->
    <style type="text/tailwindcss">
        @theme {
    --color-primary: #1C1C1C;
    --color-secondary: #777777;
    --color-accent: #494949;
    --font-manrope: "Manrope", sans-serif;
    --background-image-brand-gradient: linear-gradient(to left, #FF0000, #FF8938);
  }
    </style>
</head>

<body class="font-manrope">
    <!-- Header -->
    <header>
        <!-- Navbar -->
        <nav class="max-w-7xl mx-auto px-6 py-5">
            <div class="flex items-center justify-between">

                <!-- Logo -->
                <a href="#" class="text-3xl font-extrabold text-primary">
                    Tea House
                </a>

                <!-- Desktop Navigation -->
                <div class="hidden md:flex items-center gap-8">
                    <a href="#" class="text-secondary hover:text-primary transition">Home</a>
                    <a href="#" class="text-secondary hover:text-primary transition">Menu</a>
                    <a href="#" class="text-secondary hover:text-primary transition">About</a>
                    <a href="#" class="text-secondary hover:text-primary transition">Contact</a>
                </div>

                <!-- Desktop Button -->
                <div class="hidden md:block">
                    <button
                        class="bg-brand-gradient text-white px-6 py-3 rounded-lg font-semibold hover:opacity-90 transition cursor-pointer">
                        Order Now
                    </button>
                </div>

                <!-- Mobile Hamburger -->
                <button class="md:hidden text-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>

            </div>
        </nav>
    </header>

    <!-- Main -->
    <main>
        <!-- Hero Section -->
        <section class="max-w-7xl mx-auto px-6 py-12 lg:py-20">
            <div class="grid lg:grid-cols-2 gap-12 items-center">

                <!-- Left Content -->
                <div>
                    <h1 class="text-5xl md:text-6xl lg:text-7xl font-extrabold text-primary leading-tight">
                        It's good <br>
                        tea time at The <br>
                        Tea House
                    </h1>

                    <p class="mt-6 text-secondary text-lg max-w-lg">
                        Tea and Botanical Solutions Supplier Give Optimum
                        Satisfaction To Your Taste Buds.
                    </p>

                    <button
                        class="mt-8 inline-flex items-center gap-2 bg-brand-gradient text-white px-7 py-4 rounded-xl font-semibold text-lg hover:opacity-90 transition">
                        Explore Menu

                        <!-- Arrow Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14m-6-6l6 6-6 6" />
                        </svg>
                    </button>
                </div>

                <!-- Right Content -->
                <div class="relative">

                    <!-- Hero Image -->
                    <img src="./images/banner.png" alt="Tea Cup" class="w-full">

                    <!-- Rating Card -->
                    <div
                        class="absolute bottom-4 left-8 bg-white rounded-xl shadow-lg px-6 py-4 flex items-center gap-4">

                        <!-- Star Icon -->
                        <div>
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-yellow-400"
                                viewBox="0 0 20 20" fill="currentColor">
                                <path
                                    d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.176 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.719c-.783-.57-.38-1.81.588-1.81H7.03a1 1 0 00.95-.69l1.07-3.292z" />
                            </svg>
                        </div>

                        <!-- Rating Text -->
                        <div>
                            <h3 class="text-2xl font-extrabold text-primary">
                                5.00
                            </h3>
                            <p class="text-secondary">
                                Trust Pilot Ratings
                            </p>
                        </div>

                    </div>

                </div>

            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>

    </footer>
</body>

</html>
